<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; }

        .navbar {
            background: #4F46E5; color: white; padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 20px; font-weight: 700; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; opacity: 0.85; }
        .navbar a:hover { opacity: 1; }

        .container { max-width: 760px; margin: 48px auto; padding: 0 20px; }

        .hero { text-align: center; margin-bottom: 36px; }
        .hero h2 { font-size: 32px; color: #1e293b; font-weight: 700; }
        .hero p { color: #64748b; margin-top: 8px; font-size: 16px; }

        .card {
            background: white; border-radius: 16px;
            padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        }

        .upload-area {
            border: 2px dashed #c7d2fe; border-radius: 12px;
            padding: 40px; text-align: center; background: #eef2ff;
            cursor: pointer; transition: all 0.2s;
        }
        .upload-area:hover { border-color: #4F46E5; background: #e0e7ff; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 40px; margin-bottom: 12px; }
        .upload-area label { cursor: pointer; }
        .upload-area p { color: #6366f1; font-weight: 500; font-size: 15px; }
        .upload-area small { color: #94a3b8; font-size: 13px; }
        #file-name { margin-top: 10px; color: #4F46E5; font-size: 14px; font-weight: 500; }

        .divider { text-align: center; margin: 24px 0; color: #94a3b8; font-size: 14px; position: relative; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%; width: 44%; height: 1px; background: #e2e8f0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .jd-label { font-weight: 600; color: #374151; font-size: 14px; margin-bottom: 8px; display: block; }
        .jd-textarea {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0;
            border-radius: 10px; font-size: 14px; resize: vertical;
            min-height: 120px; color: #374151; outline: none; transition: border 0.2s;
        }
        .jd-textarea:focus { border-color: #4F46E5; }

        .btn {
            width: 100%; padding: 14px; background: #4F46E5; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 20px; transition: background 0.2s;
        }
        .btn:hover { background: #4338ca; }

        .error {
            background: #fef2f2; border: 1px solid #fecaca;
            color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;
        }

        /* Spinner overlay */
        #spinner-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(255,255,255,0.85); z-index: 999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #spinner-overlay.active { display: flex; }
        .spinner {
            width: 52px; height: 52px; border: 5px solid #e0e7ff;
            border-top-color: #4F46E5; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #spinner-overlay p { margin-top: 16px; color: #4F46E5; font-weight: 600; font-size: 16px; }
    </style>
</head>
<body>

<div id="spinner-overlay">
    <div class="spinner"></div>
    <p>Analyzing your resume...</p>
</div>

<nav class="navbar">
    <h1>🧠 AI Resume Analyzer</h1>
    
</nav>

<div class="container">
    <div class="hero">
        <h2>Analyze Your Resume Instantly</h2>
        <p>Upload your resume and get AI-powered feedback in seconds.</p>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="/analyze/" enctype="multipart/form-data" id="upload-form">
            {% csrf_token %}

            <div class="upload-area" onclick="document.getElementById('resume-input').click()">
                <div class="upload-icon">📄</div>
                <label>
                    <p>Click to upload your resume</p>
                    <small>Supported: PDF, DOC, DOCX</small>
                </label>
                <input type="file" id="resume-input" name="resume" accept=".pdf,.docx,.doc" required
                    onchange="document.getElementById('file-name').textContent = this.files[0]?.name || ''">
                <div id="file-name"></div>
            </div>

            <div class="divider">Optional</div>

            <label class="jd-label">Paste Job Description (for JD matching)</label>
            <textarea class="jd-textarea" name="job_description"
                placeholder="Paste the job description here to see how well your resume matches..."></textarea>

            <button type="submit" class="btn" onclick="showSpinner()">Analyze Resume</button>
        </form>
    </div>
</div>

<script>
    function showSpinner() {
        const file = document.getElementById('resume-input').files[0];
        if (file) {
            document.getElementById('spinner-overlay').classList.add('active');
        }
    }
</script>
</body>
</html>
